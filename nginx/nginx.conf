worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 1M;

    # Rate-limit API writes to reduce abuse of open endpoints.
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=15r/s;

    upstream settleit_backend { server backend:8000; }
    upstream settleit_frontend { server frontend:80; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # Health: exposed so AWS target group / Docker swarm / uptime checks hit Nginx itself.
        location = /health {
            access_log off;
            return 200 "ok\n";
            default_type text/plain;
        }

        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass http://settleit_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /ws/ {
            proxy_pass http://settleit_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://settleit_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
